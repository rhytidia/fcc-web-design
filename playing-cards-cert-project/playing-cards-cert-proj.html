<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Playing Cards</title>
		<link rel="stylesheet" href="styles.css" />
	</head>

	<body>
		<main id="playing-cards">
			<div class="card red">
				<div class="left">
					<span class="top-bottom-char">A</span>
					<span class="small-icon">♥</span>
				</div>
				<div class="middle">
					<span class="large-icon">♥</span>
				</div>
				<div class="right">
					<span class="small-icon">♥</span>
					<span class="top-bottom-char">A</span>
				</div>
			</div>
			<div class="card">
				<div class="left">
					<span class="top-bottom-char">2</span>
					<span class="small-icon">♠</span>
				</div>
				<div class="middle">
					<span class="medium-icon">♠</span>
					<span class="medium-icon down">♠</span>
				</div>
				<div class="right">
					<span class="small-icon">♠</span>
					<span class="top-bottom-char">2</span>
				</div>
			</div>
			<div class="card">
				<div class="left">
					<span class="top-bottom-char">3</span>
					<span class="small-icon">♣</span>
				</div>
				<div class="middle">
					<span class="medium-icon">♣</span>
					<span class="medium-icon">♣</span>
					<span class="medium-icon down">♣</span>
				</div>
				<div class="right">
					<span class="small-icon">♣</span>
					<span class="top-bottom-char">3</span>
				</div>
			</div>
			<div class="card red">
				<div class="left">
					<span class="top-bottom-char">4</span>
					<span class="small-icon">♦</span>
				</div>
				<div class="middle">
					<div class="row">
						<span class="medium-icon">♦</span>
						<span class="medium-icon">♦</span>
					</div>
					<div class="row">
						<span class="medium-icon">♦</span>
						<span class="medium-icon">♦</span>
					</div>
				</div>
				<div class="right">
					<span class="small-icon">♦</span>
					<span class="top-bottom-char">4</span>
				</div>
			</div>
			<div class="card red">
				<div class="left">
					<span class="top-bottom-char">5</span>
					<span class="small-icon">♥</span>
				</div>
				<div class="middle">
					<div class="row">
						<span class="medium-small-icon">♥</span>
						<span class="medium-small-icon">♥</span>
					</div>
					<div class="row">
						<span class="medium-small-icon">♥</span>
					</div>
					<div class="row">
						<span class="medium-small-icon">♥</span>
						<span class="medium-small-icon">♥</span>
					</div>
				</div>
				<div class="right">
					<span class="small-icon">♥</span>
					<span class="top-bottom-char">5</span>
				</div>
			</div>
		</main>
	</body>
</html>
